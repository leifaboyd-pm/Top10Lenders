<style>
:root{--teal:#00818D;--teal-dark:#006672;--teal-ink:#002c33;--teal-light:#e6f5f6;--teal-mid:#bce8ec;--gold:#FFAC27;--gold-dark:#D68A00;--gold-soft:#FFF3D9;--warm:#8A7E78;--warm-light:#f5f3f1;--text-dark:#1a2e35;--text-mid:#3a4e55;--text-light:#6b7c82;--text-faint:#9ba8ae;--cream:#fbf9f5;--white:#fff;--border:#e0dcda;--border-light:#eee8e1;--shadow-sm:0 2px 8px rgba(0,44,51,.06);--r-sm:6px;--r-md:10px}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;color:var(--text-dark);background:var(--cream);-webkit-font-smoothing:antialiased;line-height:1.5}

/* TOOLBAR */
.toolbar{background:var(--teal-ink);color:#fff;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.toolbar-brand{display:flex;align-items:center;gap:10px}
.toolbar-logo{width:26px;height:26px}
.toolbar-name{font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.toolbar-tagline{font-family:'Lora',serif;font-style:italic;font-size:10px;color:var(--gold)}
.toolbar-actions{display:flex;align-items:center;gap:10px}
.toolbar-file-info{font-size:10px;color:rgba(255,255,255,.5);font-weight:500}
.toolbar-btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);padding:6px 14px;border-radius:5px;font-size:10px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;letter-spacing:.5px;transition:all .2s;text-transform:uppercase}
.toolbar-btn:hover{background:rgba(255,255,255,.2)}
.toolbar-btn.primary{background:var(--teal);border-color:var(--teal)}
.toolbar-btn.primary:hover{background:var(--teal-dark)}
.toolbar-btn.gold{background:var(--gold);border-color:var(--gold);color:var(--teal-ink)}
.toolbar-btn.gold:hover{background:var(--gold-dark);color:#fff}

/* UPLOAD */
.upload-screen{max-width:580px;margin:80px auto;text-align:center;padding:0 28px}
.upload-screen h1{font-family:'Lora',serif;font-size:28px;font-weight:600;color:var(--text-dark);margin-bottom:10px}
.upload-screen p{font-size:14px;color:var(--text-mid);margin-bottom:36px}
.upload-area{border:2px dashed var(--border);border-radius:var(--r-md);padding:48px 32px;background:var(--white);cursor:pointer;transition:all .25s}
.upload-area:hover,.upload-area.dragover{border-color:var(--teal);background:var(--teal-light);transform:translateY(-2px)}
.upload-area svg{width:36px;height:36px;color:var(--teal);opacity:.4;margin-bottom:14px}
.upload-title{font-size:15px;font-weight:700;color:var(--text-dark);margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--text-light)}
.file-input{display:none}

/* CONFIG BAR */
.config-bar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:14px}
.config-bar label{font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.config-bar select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:'Barlow',sans-serif;font-weight:600;color:var(--text-dark);background:var(--white);min-width:180px}
.config-bar select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px rgba(0,129,141,.1)}

/* DASHBOARD */
.dashboard{max-width:1060px;margin:0 auto;padding:28px}
.report-header{text-align:center;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.report-header h1{font-family:'Lora',serif;font-size:24px;font-weight:600;color:var(--text-dark);margin-bottom:3px}
.report-header .sub{font-size:13px;color:var(--text-mid)}
.report-header .meta{font-size:11px;color:var(--text-faint);margin-top:2px}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 12px;text-align:center;box-shadow:var(--shadow-sm)}
.kpi-card.highlight{background:var(--teal-light);border-color:var(--teal-mid)}
.kpi-value{font-size:20px;font-weight:800;color:var(--teal-dark);letter-spacing:-.5px}
.kpi-label{font-size:8px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}

/* SECTION */
.section-title{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--text-dark);margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid var(--teal)}

/* PRIMARY TABLE */
.primary-table-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;margin-bottom:28px;box-shadow:var(--shadow-sm)}
.table-header{background:var(--warm);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:baseline}
.table-header-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.table-header-total{font-size:18px;font-weight:800}
.data-table{width:100%;border-collapse:collapse}
.data-table th{background:var(--cream);color:var(--text-light);font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:8px 12px;text-align:left;border-bottom:2px solid var(--border)}
.data-table th.right{text-align:right}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border-light);font-size:12px;font-weight:500}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover{background:var(--cream)}
.rank{font-weight:800;color:var(--teal);text-align:center;width:40px}
.lender-name{font-weight:700;color:var(--text-dark)}
.volume-bar-wrap{display:flex;align-items:center;gap:8px}
.volume-bar{flex:1;height:5px;background:var(--border-light);border-radius:3px;overflow:hidden}
.volume-bar-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .4s ease}
.volume-amount{font-weight:700;color:var(--text-dark);font-size:12px;white-space:nowrap;font-variant-numeric:tabular-nums;min-width:84px;text-align:right}
.units{text-align:right;color:var(--text-mid);font-variant-numeric:tabular-nums}
.avg{text-align:right;color:var(--text-light);font-size:11px;font-variant-numeric:tabular-nums}

/* ROLLING PERIODS */
.periods-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.period-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.period-card-header{background:var(--teal-ink);color:#fff;padding:10px 12px;display:flex;justify-content:space-between;align-items:baseline}
.period-card-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.period-card-total{font-size:14px;font-weight:800}
.period-table{width:100%;border-collapse:collapse}
.period-table th{background:var(--cream);color:var(--text-light);font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.period-table th.right{text-align:right}
.period-table td{padding:6px 8px;border-bottom:1px solid var(--border-light);font-size:10px;font-weight:500}
.period-table tr:last-child td{border-bottom:none}
.period-rank{font-weight:800;color:var(--teal);text-align:center;width:26px;font-size:10px}
.period-lender{font-weight:700;color:var(--text-dark);font-size:10px}
.period-volume{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;font-size:10px}
.period-units{text-align:right;color:var(--text-mid);font-size:9px;font-variant-numeric:tabular-nums}

/* MONTHLY CARDS */
.monthly-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.monthly-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.monthly-card-header{background:var(--cream);padding:12px;text-align:center;border-bottom:1px solid var(--border)}
.monthly-card-month{font-size:12px;font-weight:700;color:var(--text-dark)}
.monthly-card-total{font-size:16px;font-weight:800;color:var(--teal);margin-top:2px}
.monthly-card-units{font-size:9px;color:var(--text-light);font-weight:600}
.monthly-list{padding:8px 12px}
.monthly-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-light);font-size:10px}
.monthly-item:last-child{border-bottom:none}
.monthly-item-rank{font-weight:800;color:var(--teal);width:16px;font-size:9px}
.monthly-item-name{flex:1;font-weight:600;color:var(--text-dark);margin-left:4px}
.monthly-item-vol{font-weight:600;color:var(--text-dark);font-size:9px;font-variant-numeric:tabular-nums}

/* FOOTER */
.report-footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--border);text-align:center;font-size:10px;color:var(--text-light)}
.report-footer strong{color:var(--teal-dark)}
.report-footer em{font-family:'Lora',serif;color:var(--gold-dark)}

.hidden{display:none}

/* PRINT / PDF EXPORT */
@media print{
  @page{margin:.5in .6in;size:letter}
  body{background:#fff!important}
  .toolbar,.config-bar{display:none!important}
  .dashboard{padding:0;max-width:none}
  .report-header{margin-bottom:14pt;padding-bottom:8pt}
  .report-header h1{font-size:18pt}
  .kpi-strip{gap:8pt;margin-bottom:14pt}
  .kpi-card{padding:10pt 6pt}
  .kpi-value{font-size:14pt}
  .kpi-label{font-size:6pt}
  .section-title{font-size:12pt;margin-bottom:8pt;page-break-after:avoid}
  .primary-table-wrap{page-break-inside:avoid;margin-bottom:14pt;box-shadow:none}
  .data-table th{font-size:6pt;padding:5pt 6pt}
  .data-table td{font-size:9pt;padding:6pt}
  .volume-bar{display:none}
  .volume-amount{min-width:auto}
  .periods-grid{page-break-before:always;gap:8pt;margin-bottom:14pt}
  .period-card{page-break-inside:avoid;box-shadow:none}
  .period-card-header{padding:8pt 10pt}
  .period-card-total{font-size:11pt}
  .period-table th{font-size:6pt;padding:4pt 5pt}
  .period-table td{font-size:8pt;padding:4pt 5pt}
  .monthly-grid{page-break-before:always;gap:6pt}
  .monthly-card{page-break-inside:avoid;box-shadow:none}
  .monthly-card-total{font-size:11pt}
  .monthly-item{font-size:8pt;padding:3pt 0}
  .report-footer{margin-top:10pt;padding-top:6pt;font-size:7pt}
}
</style>

<script>
let allSheetsData={},availableSheets=[];

/* DATA EXTRACTION (proven) */
const normalizeLenderName=(name)=>{
  if(!name||typeof name!=='string')return'';
  const n=name.trim().toLowerCase();
  const m={'the loan store':'The Loan Store','loan store':'The Loan Store','tls':'The Loan Store','uwm':'UWM','united wholesale mortgage':'UWM','first colony':'First Colony','pennymac':'Pennymac','kind lending':'Kind Lending','mortgageone tpo':'MortgageOne TPO','freedom mortgage':'Freedom Mortgage','loanstream':'Loanstream','homebridge':'Homebridge','homexpress':'HomeXpress','windsor':'Windsor','prmg':'PRMG','valere':'Valere','quorum':'Quorum','royal business bank':'Royal Business Bank'};
  if(m[n])return m[n];
  return name.trim().split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
};

const extractLenderData=(jsonData,sheetName)=>{
  if(!jsonData||jsonData.length<5)return{lenders:[],period:sheetName,totalVolume:0};
  let headerRow=-1,investorCol=-1,amountCol=-1;

  for(let i=0;i<Math.min(15,jsonData.length);i++){
    const row=jsonData[i]||[];
    for(let j=0;j<Math.min(20,row.length);j++){
      const cell=String(row[j]||'').toLowerCase().trim();
      if(cell==='investor'||cell.includes('investor')){investorCol=j;headerRow=i;}
      if(cell==='amount'||cell.includes('loan amount')){amountCol=j;if(headerRow===-1)headerRow=i;}
    }
  }

  if(investorCol===-1||amountCol===-1){
    for(let i=0;i<Math.min(15,jsonData.length);i++){
      const row=jsonData[i]||[];
      if(row.length>=7){
        const h=row.slice(0,7).map(c=>String(c||'').toLowerCase().trim());
        if((h[0].includes('loan officer')||h[0].includes('lender'))&&h[3]==='investor'&&(h[6]==='amount'||h[6].includes('amount'))){
          headerRow=i;investorCol=3;amountCol=6;break;
        }
      }
    }
  }

  if(investorCol===-1||amountCol===-1)return{lenders:[],period:sheetName,totalVolume:0};

  const lenders={};
  for(let i=headerRow+1;i<Math.min(jsonData.length,headerRow+200);i++){
    const row=jsonData[i]||[];
    const rawInvestor=String(row[investorCol]||'').trim();
    const rawAmount=String(row[amountCol]||'').trim();
    if(!rawInvestor||!rawAmount)continue;
    const amount=parseFloat(rawAmount.replace(/[,$]/g,''))||0;
    if(amount<=1000)continue;
    const name=normalizeLenderName(rawInvestor);
    if(!lenders[name])lenders[name]={totalVolume:0,totalUnits:0};
    lenders[name].totalVolume+=amount;
    lenders[name].totalUnits+=1;
  }

  const sorted=Object.entries(lenders).map(([name,d])=>({name,volume:d.totalVolume,units:d.totalUnits})).filter(l=>l.volume>0).sort((a,b)=>b.volume-a.volume).slice(0,10).map((l,i)=>({...l,rank:i+1}));
  return{lenders:sorted,period:sheetName,totalVolume:sorted.reduce((s,l)=>s+l.volume,0)};
};

const calculateRollingPeriods=(currentMonth)=>{
  const idx=availableSheets.indexOf(currentMonth);
  const hist=availableSheets.slice(0,idx+1).reverse();
  const periods=[{name:'3-month',months:3},{name:'6-month',months:6},{name:'1-year',months:12}];
  const results={};
  periods.forEach(({name,months})=>{
    const sheets=hist.slice(0,Math.min(months,hist.length));
    const agg={};
    sheets.forEach(period=>{
      const data=extractLenderData(allSheetsData[period],period);
      data.lenders.forEach(l=>{
        const n=normalizeLenderName(l.name);
        if(!agg[n])agg[n]={name:n,totalVolume:0,totalUnits:0};
        agg[n].totalVolume+=l.volume;agg[n].totalUnits+=l.units;
      });
    });
    results[name]=Object.values(agg).sort((a,b)=>b.totalVolume-a.totalVolume).slice(0,10).map((l,i)=>({...l,rank:i+1}));
  });
  return results;
};

const fmtCur=(v)=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(v);
const fmtNum=(v)=>new Intl.NumberFormat('en-US').format(v);

/* RENDER DASHBOARD */
function generateReport(){
  const month=document.getElementById('monthSelect').value;
  if(!month)return;
  const current=extractLenderData(allSheetsData[month],month);
  const rolling=calculateRollingPeriods(month);
  const now=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const maxVol=current.lenders.length>0?current.lenders[0].volume:1;
  const idx=availableSheets.indexOf(month);
  const recent=availableSheets.slice(Math.max(0,idx-5),idx+1).reverse();

  let html=`
    <div class="report-header">
      <h1>Top 10 Lenders Report</h1>
      <div class="sub">Comprehensive Analysis Through ${month}</div>
      <div class="meta">Generated ${now}</div>
    </div>
    <div class="kpi-strip">
      <div class="kpi-card highlight">
        <div class="kpi-value">${fmtCur(current.totalVolume)}</div>
        <div class="kpi-label">${month} Total</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">${fmtCur((rolling['3-month']||[]).reduce((s,l)=>s+l.totalVolume,0))}</div>
        <div class="kpi-label">3-Month Rolling</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">${fmtCur((rolling['6-month']||[]).reduce((s,l)=>s+l.totalVolume,0))}</div>
        <div class="kpi-label">6-Month Rolling</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">${fmtCur((rolling['1-year']||[]).reduce((s,l)=>s+l.totalVolume,0))}</div>
        <div class="kpi-label">1-Year Rolling</div>
      </div>
    </div>

    <h2 class="section-title">${month} Performance</h2>
    <div class="primary-table-wrap">
      <div class="table-header">
        <span class="table-header-title">Top 10 Lenders</span>
        <span class="table-header-total">${fmtCur(current.totalVolume)}</span>
      </div>
      <table class="data-table">
        <thead><tr><th style="width:40px">Rank</th><th>Lender</th><th style="width:260px">Volume</th><th class="right" style="width:50px">Units</th><th class="right" style="width:100px">Avg Loan</th></tr></thead>
        <tbody>`;

  current.lenders.forEach(l=>{
    const pct=(l.volume/maxVol*100).toFixed(0);
    const avg=l.units>0?l.volume/l.units:0;
    html+=`<tr><td class="rank">${l.rank}</td><td class="lender-name">${l.name}</td><td><div class="volume-bar-wrap"><div class="volume-bar"><div class="volume-bar-fill" style="width:${pct}%"></div></div><span class="volume-amount">${fmtCur(l.volume)}</span></div></td><td class="units">${fmtNum(l.units)}</td><td class="avg">${fmtCur(avg)}</td></tr>`;
  });

  html+=`</tbody></table></div>

    <h2 class="section-title">Rolling Period Analysis</h2>
    <div class="periods-grid">`;

  ['3-month','6-month','1-year'].forEach(period=>{
    const data=rolling[period]||[];
    const total=data.reduce((s,l)=>s+l.totalVolume,0);
    html+=`<div class="period-card"><div class="period-card-header"><span class="period-card-label">${period.replace('-',' ')}</span><span class="period-card-total">${fmtCur(total)}</span></div><table class="period-table"><thead><tr><th style="width:26px">#</th><th>Lender</th><th class="right">Volume</th><th class="right" style="width:36px">Units</th></tr></thead><tbody>`;
    data.forEach(l=>{
      html+=`<tr><td class="period-rank">${l.rank}</td><td class="period-lender">${l.name}</td><td class="period-volume">${fmtCur(l.totalVolume)}</td><td class="period-units">${fmtNum(l.totalUnits)}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });

  html+=`</div>
    <h2 class="section-title">Month-by-Month Performance</h2>
    <div class="monthly-grid">`;

  recent.forEach(mo=>{
    const d=extractLenderData(allSheetsData[mo],mo);
    const totalUnits=d.lenders.reduce((s,l)=>s+l.units,0);
    html+=`<div class="monthly-card"><div class="monthly-card-header"><div class="monthly-card-month">${mo}</div><div class="monthly-card-total">${fmtCur(d.totalVolume)}</div><div class="monthly-card-units">${fmtNum(totalUnits)} units</div></div><div class="monthly-list">`;
    d.lenders.slice(0,5).forEach((l,i)=>{
      html+=`<div class="monthly-item"><span class="monthly-item-rank">${i+1}.</span><span class="monthly-item-name">${l.name}</span><span class="monthly-item-vol">${fmtCur(l.volume)}</span></div>`;
    });
    html+=`</div></div>`;
  });

  html+=`</div>
    <div class="report-footer"><strong>Partners Mortgage</strong> &bull; <em>You matter.</em><br>Report generated ${now} &bull; Data extracted with dynamic column detection</div>`;

  document.getElementById('reportArea').innerHTML=html;
  document.getElementById('reportArea').classList.remove('hidden');
  document.getElementById('exportBtn').classList.remove('hidden');
}

/* FILE HANDLING */
const uploadArea=document.getElementById('uploadArea');
const fileInput=document.getElementById('fileInput');
uploadArea.addEventListener('click',()=>fileInput.click());
uploadArea.addEventListener('dragover',(e)=>{e.preventDefault();uploadArea.classList.add('dragover');});
uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop',(e)=>{e.preventDefault();uploadArea.classList.remove('dragover');if(e.dataTransfer.files.length>0)processFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',(e)=>{if(e.target.files.length>0)processFile(e.target.files[0]);});

async function processFile(file){
  try{
    const ab=await file.arrayBuffer();
    const wb=XLSX.read(ab,{type:'array'});
    allSheetsData={};availableSheets=[];
    wb.SheetNames.forEach(name=>{allSheetsData[name]=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1});availableSheets.push(name);});
    const sel=document.getElementById('monthSelect');
    sel.innerHTML='<option value="">Select month...</option>';
    availableSheets.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
    document.getElementById('uploadScreen').classList.add('hidden');
    document.getElementById('configBar').classList.remove('hidden');
    document.getElementById('newFileBtn').classList.remove('hidden');
    document.getElementById('fileInfo').textContent=file.name+' \u2022 '+availableSheets.length+' sheets';
  }catch(err){alert('Error processing file: '+err.message);}
}

document.getElementById('monthSelect').addEventListener('change',(e)=>{
  document.getElementById('generateBtn').disabled=!e.target.value;
  if(e.target.value)generateReport();
});

function resetUpload(){
  allSheetsData={};availableSheets=[];
  document.getElementById('uploadScreen').classList.remove('hidden');
  document.getElementById('configBar').classList.add('hidden');
  document.getElementById('reportArea').classList.add('hidden');
  document.getElementById('reportArea').innerHTML='';
  document.getElementById('exportBtn').classList.add('hidden');
  document.getElementById('newFileBtn').classList.add('hidden');
  document.getElementById('fileInfo').textContent='';
  document.getElementById('fileInput').value='';
}
</script>
</body>
</html>
